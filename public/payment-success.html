<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful – FitFuel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0fdf4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
      padding: 48px 32px;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      line-height: 1;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #166534;
      margin-bottom: 12px;
    }
    p {
      color: #4b5563;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .note {
      margin-top: 24px;
      background: #f0fdf4;
      border-radius: 10px;
      padding: 14px 18px;
      color: #166534;
      font-size: 0.9rem;
    }
    .brand {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for choosing <strong>FitFuel</strong>.</p>
    <p>Your meal plan subscription is now being activated.</p>
    <div class="note">
      📱 You'll receive a confirmation message on WhatsApp shortly with your plan details.
    </div>
    <p class="brand">FitFuel &mdash; Fresh meals, every day</p>
  </div>
</body>
</html>
